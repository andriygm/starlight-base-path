name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test

      - run: bun run typecheck

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      # Build the example against the latest Astro/Starlight. It enables
      # starlight-links-validator, so the build fails if the base path stops
      # being applied to content or frontmatter links — the regression that
      # motivated this plugin's Astro 7 support.
      - run: bun install
        working-directory: examples/simple

      - run: bun run build
        working-directory: examples/simple
