name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

  example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Build the example against the latest Astro/Starlight. It enables
      # starlight-links-validator, so the build fails if the base path stops
      # being applied to content or frontmatter links — the regression that
      # motivated this plugin's Astro 7 support.
      - name: Install example dependencies
        run: bun install
        working-directory: examples/simple

      - name: Build example
        run: bun run build
        working-directory: examples/simple
